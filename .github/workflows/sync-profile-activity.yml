name: Sync profile activity

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check activity sync configuration
        run: node scripts/check-activity-sync-config.mjs

      - name: Test activity formatter
        run: node --test scripts/*.test.mjs

      - name: Sync GitHub activity block
        run: node scripts/sync-github-activity.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated activity numbers
        run: |
          if git diff --quiet README.md; then
            echo "README activity numbers are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Sync GitHub activity numbers"
          git push
